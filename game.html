<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game - Learn Through Games</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="game">
  <div class="confetti-layer" id="confettiLayer" aria-hidden="true"></div>
  <div class="toast-zone" id="toastZone" aria-live="polite"></div>
  <header class="topbar">
    <a class="brand-button" href="index.html"><span class="brand-icon">LTG</span><span>Learn Through Games</span></a>
    <nav class="nav-actions">
      <a href="subjects.html">Subjects</a>
      <a href="dashboard.html">Dashboard</a>
      <button class="icon-button" id="darkModeToggle" type="button">☾</button>
    </nav>
  </header>
  <main class="app-shell">
    <section class="game-hud">
      <div>
        <p class="eyebrow" id="gameBreadcrumb">Challenge</p>
        <h1 id="gameTitle">Loading...</h1>
      </div>
      <div class="hud-stats">
        <div><span>Total XP</span><strong id="hudXp">0</strong></div>
        <div><span>Streak</span><strong id="hudStreak">0</strong></div>
      </div>
    </section>

    <section class="panel" id="setupPanel">
      <div class="story-card">
        <span class="story-icon">🏆</span>
        <div>
          <p class="eyebrow">Story Mode</p>
          <h2>Become a Knowledge Champion</h2>
          <p id="missionText">Each subject is a mission, each class is a level, and each difficulty is a challenge.</p>
        </div>
      </div>
      <div class="control-grid">
        <label class="select-field"><span>Game Type</span><select id="gameType">
          <option value="quiz">Quiz Mode</option>
          <option value="picture">Picture Recognition</option>
          <option value="drag">Drag & Drop Matching</option>
          <option value="memory">Memory Card Game</option>
          <option value="fill">Fill in the Blanks</option>
        </select></label>
        <label class="select-field"><span>Mode</span><select id="gameMode">
          <option value="normal">Normal Quiz</option>
          <option value="timer">Timer Mode</option>
          <option value="daily">Daily Challenge</option>
        </select></label>
        <button class="primary-button" id="startRoundBtn" type="button">Start Game</button>
      </div>
    </section>

    <section class="screen" id="playScreen">
      <div class="game-card">
        <div class="game-meta"><span id="roundLabel">Question 1 of 10</span><span>Round XP: <strong id="roundXp">0</strong></span></div>
        <div class="xp-track"><div class="xp-fill" id="roundProgress"></div></div>
        <div class="timer-pill hidden" id="timerPill">30s</div>
        <div id="gameArea"></div>
        <p class="feedback" id="answerFeedback" aria-live="polite"></p>
        <button class="primary-button next-button hidden" id="nextActionBtn" type="button">Next</button>
      </div>
    </section>

    <section class="screen" id="summaryScreen">
      <div class="result-card game-card">
        <span class="result-icon">🏁</span>
        <h2 id="summaryTitle">Challenge Complete</h2>
        <p id="summaryText"></p>
        <div class="summary-actions">
          <button class="primary-button" id="replayBtn" type="button">Replay</button>
          <a class="secondary-button" id="nextChallengeLink" href="subjects.html">Next Challenge</a>
          <a class="secondary-button" href="dashboard.html">Dashboard</a>
        </div>
      </div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
